# Hamiltonian mechanics — proper QGRE showcase with phase-gated curriculum
# 121 sympy-verified problems, 4-phase progressive reward, difficulty-gated prompt release

model:
  path: unsloth/Qwen3-1.7B-unsloth-bnb-4bit
  lora_rank: 8
  lora_alpha: 16
  load_in_4bit: true
  fast_inference: true
  gpu_memory_utilization: 0.35

data:
  train_files:
    - examples/hamiltonian/data/train.parquet
  max_prompt_length: 512
  train_batch_size: 4
  prompt_column: prompt
  metadata_columns:
    - ground_truth
    - H_expr
    - T_expr
    - V_expr
    - dqdt
    - dpdt
    - coordinates
    - difficulty
    - system
  difficulty_column: difficulty
  difficulty_schedule:
    1: [tier1, edge]
    2: [tier1, edge, tier2]
    3: [tier1, edge, tier2, tier3]
    4: [tier1, edge, tier2, tier3, tier4, adversarial]

generation:
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  max_tokens: 2048
  stop_token_ids: [151643, 151645]

algorithm:
  mode: spo
  spo:
    lr: 0.1
    n: 1
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  llds_coef: 0.0
  loss_type: grpo
  segmenter: uniform

  step_qualities:
    1: [q_format, q_has_math]
    2: [q_identifies_T, q_identifies_V, q_grounding]
    3: [q_correct_dqdt, q_correct_dpdt]
    4: [q_correct_H, q_consistency]

training:
  total_steps: 400
  lr: 5.0e-6
  warmup_steps: 10
  lr_scheduler: cosine
  save_freq: 50
  gradient_accumulation_steps: 1
  mastery_threshold: 0.8
  stagnation_timeout: 100

logging:
  mlflow_experiment: hamiltonian-curriculum-400
  completion_dir: output/hamiltonian/completions
  checkpoint_dir: output/hamiltonian/checkpoints
