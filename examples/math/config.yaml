# Math example — minimal QGRE config
# Demonstrates: even with scalar rewards, engine works (falls back to uniform advantages)

model:
  path: Qwen/Qwen3-1.7B
  lora_rank: 8
  lora_alpha: 16
  pad_token: "<|fim_pad|>"
  pad_token_id: 151662
  modules_to_save: [lm_head]  # embed_tokens removed — fim_pad is pre-trained, saves ~1.2 GB

data:
  train_files:
    - data/math_train.parquet
  max_prompt_length: 512
  train_batch_size: 8
  metadata_columns: [answer]

generation:
  temperature: 1.0
  top_p: 1.0
  top_k: -1
  max_tokens: 4096
  stop_token_ids: [151643, 151645]  # Qwen3: <|endoftext|>, <|im_end|>

algorithm:
  mode: grpo
  grpo:
    n: 4
    filter_groups: true
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  step_qualities:
    1: [q_correct_answer]

training:
  total_steps: 200
  lr: 1.0e-5
